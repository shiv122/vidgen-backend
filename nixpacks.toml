# Nixpacks build config for Coolify.
# https://coolify.io/docs/applications/django
#
# Do NOT put python in nixPkgs — Nixpacks' Python provider already supplies a
# prebuilt CPython (detected from pyproject.toml / requirements.txt). Forcing
# python313 via nixPkgs makes Nix compile CPython + Cython from source on every
# build, which never finishes inside Coolify's build window (the infinite loop).

[phases.setup]
# ffmpeg is needed at runtime by generator/services/compositor.py for the
# facecam overlay. Install via apt so we don't drag in a second Nix Python.
aptPkgs = ["ffmpeg"]

[phases.build]
# Nixpacks puts the install venv on PATH, so `python` is the project venv.
cmds = ["python manage.py collectstatic --noinput"]

[start]
# Coolify provides $PORT (defaults to 8000). --timeout 660 > VIDEO_POLL_TIMEOUT
# (600s): the render is polled synchronously inside the request.
cmd = "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000} --workers 3 --timeout 660"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
